version: '3.8'

services:
  backend:
    build: 
      context: ./server
    ports:
      - "1234:1234"
    volumes:
      - ./server/data:/data
    environment:
      - PORT=1234
    restart: always

  frontend:
    build:
      context: ./
      args:
        - VITE_WS_URL=http://localhost:1234
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
